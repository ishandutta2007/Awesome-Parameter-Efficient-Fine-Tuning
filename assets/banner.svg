<svg width="1200" height="300" viewBox="0 0 1200 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1A2980" />
      <stop offset="100%" stop-color="#26D0CE" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="5" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  <rect width="1200" height="300" fill="url(#bg-grad)" rx="15" ry="15"/>
  <text x="50%" y="45%" font-family="Arial, sans-serif" font-size="64" font-weight="bold" fill="#ffffff" text-anchor="middle" filter="url(#glow)">Awesome PEFT</text>
  <text x="50%" y="65%" font-family="Arial, sans-serif" font-size="28" fill="#e0f2f1" text-anchor="middle">Parameter-Efficient Fine-Tuning</text>
</svg>
